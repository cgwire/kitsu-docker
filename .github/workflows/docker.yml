name: Docker

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  versions:
    runs-on: ubuntu-latest
    outputs:
      kitsu_version: ${{ steps.versions.outputs.KITSU_VERSION }}
      zou_version: ${{ steps.versions.outputs.ZOU_VERSION }}
      index_version: ${{ steps.versions.outputs.INDEX_VERSION }}
      image_tag: ${{ steps.versions.outputs.IMAGE_TAG }}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Load and validate versions
        id: versions
        run: |
          set -a
          source versions.env
          set +a

          for v in "$ZOU_VERSION" "$KITSU_VERSION"; do
            if ! echo "$v" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid version format: $v"
              exit 1
            fi
          done
          if ! echo "$INDEX_VERSION" | grep -qE '^[0-9]{1,3}$'; then
            echo "::error::INDEX_VERSION must be 1-3 digits, got: $INDEX_VERSION"
            exit 1
          fi

          IMAGE_TAG="${KITSU_VERSION}-${ZOU_VERSION}-${INDEX_VERSION}"
          echo "ZOU_VERSION=${ZOU_VERSION}" >> "$GITHUB_OUTPUT"
          echo "KITSU_VERSION=${KITSU_VERSION}" >> "$GITHUB_OUTPUT"
          echo "INDEX_VERSION=${INDEX_VERSION}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

  build:
    needs: versions
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          config: .github/buildkitd.toml

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push single-platform image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            KITSU_VERSION=${{ needs.versions.outputs.kitsu_version }}
            ZOU_VERSION=${{ needs.versions.outputs.zou_version }}
          tags: cgwire/cgwire:${{ needs.versions.outputs.image_tag }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max

  merge:
    needs: [versions, build]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create multi-platform manifest
        env:
          IMAGE_TAG: ${{ needs.versions.outputs.image_tag }}
        run: |
          docker buildx imagetools create \
            --tag "cgwire/cgwire:${IMAGE_TAG}" \
            "cgwire/cgwire:${IMAGE_TAG}"

  test:
    needs: [versions, merge]
    strategy:
      matrix:
        include:
          - platform: amd64
            runner: ubuntu-latest
            sleep: 15
          - platform: arm64
            runner: ubuntu-24.04-arm
            sleep: 10
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull and test ${{ matrix.platform }} image
        env:
          KITSU_VERSION: ${{ needs.versions.outputs.kitsu_version }}
          ZOU_VERSION: ${{ needs.versions.outputs.zou_version }}
          IMAGE_TAG: ${{ needs.versions.outputs.image_tag }}
        run: |
          CONTAINER_NAME=cgwire-${{ matrix.platform }}

          docker pull "cgwire/cgwire:${IMAGE_TAG}"

          docker container run -d --init -p 8080:80 --rm --name "${CONTAINER_NAME}" "cgwire/cgwire:${IMAGE_TAG}"

          sleep ${{ matrix.sleep }}

          docker container run --link "${CONTAINER_NAME}" \
            -e "KITSU_URL=http://${CONTAINER_NAME}:80" \
            -e "KITSU_VERSION=${KITSU_VERSION}" \
            -e "ZOU_VERSION=${ZOU_VERSION}" \
            -e TIMEOUT=1 \
            -e WAIT=1 \
            cgwire/kitsu-checker:latest

          docker kill "${CONTAINER_NAME}"

  tag:
    needs: [versions, test]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create alias tags
        env:
          KITSU_VERSION: ${{ needs.versions.outputs.kitsu_version }}
          IMAGE_TAG: ${{ needs.versions.outputs.image_tag }}
        run: |
          docker buildx imagetools create \
            "cgwire/cgwire:${IMAGE_TAG}" \
            --tag "cgwire/cgwire:${KITSU_VERSION}" \
            --tag "cgwire/cgwire:latest"
