name: Docker

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Load and validate versions
        id: versions
        run: |
          # Source versions from the single source of truth
          set -a
          source versions.env
          set +a

          # Validate version formats
          for v in "$ZOU_VERSION" "$KITSU_VERSION"; do
            if ! echo "$v" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid version format: $v"
              exit 1
            fi
          done
          if ! echo "$INDEX_VERSION" | grep -qE '^[0-9]{1,3}$'; then
            echo "::error::INDEX_VERSION must be 1-3 digits, got: $INDEX_VERSION"
            exit 1
          fi

          echo "ZOU_VERSION=${ZOU_VERSION}" >> "$GITHUB_OUTPUT"
          echo "KITSU_VERSION=${KITSU_VERSION}" >> "$GITHUB_OUTPUT"
          echo "INDEX_VERSION=${INDEX_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          config: .github/buildkitd.toml

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push multi-platform image with versioned tag
      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            KITSU_VERSION=${{ steps.versions.outputs.KITSU_VERSION }}
            ZOU_VERSION=${{ steps.versions.outputs.ZOU_VERSION }}
          tags: cgwire/cgwire:${{ steps.versions.outputs.KITSU_VERSION }}-${{ steps.versions.outputs.ZOU_VERSION }}-${{ steps.versions.outputs.INDEX_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Test amd64
      - name: Load amd64 image for testing
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          build-args: |
            KITSU_VERSION=${{ steps.versions.outputs.KITSU_VERSION }}
            ZOU_VERSION=${{ steps.versions.outputs.ZOU_VERSION }}
          tags: cgwire/cgwire:test-amd64
          cache-from: type=gha

      - name: Test amd64 image
        env:
          KITSU_VERSION: ${{ steps.versions.outputs.KITSU_VERSION }}
          ZOU_VERSION: ${{ steps.versions.outputs.ZOU_VERSION }}
        run: |
          CONTAINER_NAME=cgwire-amd64

          docker container run --platform=linux/amd64 -d --init -p 8001:80 --rm --name "${CONTAINER_NAME}" cgwire/cgwire:test-amd64

          # Wait for the container to be ready
          sleep 15

          docker container run --link "${CONTAINER_NAME}" \
            -e "KITSU_URL=http://${CONTAINER_NAME}:80" \
            -e "KITSU_VERSION=${KITSU_VERSION}" \
            -e "ZOU_VERSION=${ZOU_VERSION}" \
            -e TIMEOUT=1 \
            -e WAIT=1 \
            cgwire/kitsu-checker:latest

          docker kill "${CONTAINER_NAME}"

      # Test arm64
      - name: Load arm64 image for testing
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          load: true
          build-args: |
            KITSU_VERSION=${{ steps.versions.outputs.KITSU_VERSION }}
            ZOU_VERSION=${{ steps.versions.outputs.ZOU_VERSION }}
          tags: cgwire/cgwire:test-arm64
          cache-from: type=gha

      - name: Test arm64 image
        env:
          KITSU_VERSION: ${{ steps.versions.outputs.KITSU_VERSION }}
          ZOU_VERSION: ${{ steps.versions.outputs.ZOU_VERSION }}
        run: |
          CONTAINER_NAME=cgwire-arm64

          docker container run --platform=linux/arm64 -d --init -p 8002:80 --rm --name "${CONTAINER_NAME}" cgwire/cgwire:test-arm64

          # arm64 via QEMU is slower
          sleep 30

          docker container run --link "${CONTAINER_NAME}" \
            -e "KITSU_URL=http://${CONTAINER_NAME}:80" \
            -e "KITSU_VERSION=${KITSU_VERSION}" \
            -e "ZOU_VERSION=${ZOU_VERSION}" \
            -e TIMEOUT=1 \
            -e WAIT=1 \
            cgwire/kitsu-checker:latest

          docker kill "${CONTAINER_NAME}"

      # Add alias tags (latest + kitsu version) like script 04
      - name: Create alias tags
        env:
          KITSU_VERSION: ${{ steps.versions.outputs.KITSU_VERSION }}
          ZOU_VERSION: ${{ steps.versions.outputs.ZOU_VERSION }}
          INDEX_VERSION: ${{ steps.versions.outputs.INDEX_VERSION }}
        run: |
          docker buildx imagetools create \
            "cgwire/cgwire:${KITSU_VERSION}-${ZOU_VERSION}-${INDEX_VERSION}" \
            --tag "cgwire/cgwire:${KITSU_VERSION}" \
            --tag "cgwire/cgwire:latest"
